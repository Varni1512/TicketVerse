server:
  port: ${PORT:8084}

spring:
  application:
    name: ticketverse-contact-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketverse_contact
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:ticketverseapp@gmail.com}
    password: ${MAIL_PASSWORD:cqsvstlbkmopkosj}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    root: INFO
    com.ticketverse: DEBUG

app:
  jwt-secret: ${JWT_SECRET:c2VjcmV0LWtleS1mb3ItdGlja2V0dmVyc2UtYXBwbGljYXRpb24tc2hvdWxkLWJlLWxvbmctZW5vdWdo}
  jwt-expiration-milliseconds: 604800000
