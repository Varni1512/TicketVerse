version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: ticketverse_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketverse
    ports:
      - "5432:5432"
    volumes:
      - ticketverse_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ticketverse_data:
