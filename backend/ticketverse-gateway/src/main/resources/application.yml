server:
  port: ${PORT:8080}

spring:
  application:
    name: ticketverse-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Cache-Control
              - Content-Type
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: event-service
          uri: ${EVENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/events/**, /api/seats/**, /api/albums/**, /ws/**
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/bookings/**
        - id: contact-service
          uri: ${CONTACT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/contact/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    com.ticketverse: INFO
resilience4j.circuitbreaker:
  instances:
    backendServices:
      registerHealthIndicator: true
      slidingWindowSize: 20
      failureRateThreshold: 50
      waitDurationInOpenState: 10s
resilience4j.timelimiter:
  instances:
    backendServices:
      timeoutDuration: 5s
