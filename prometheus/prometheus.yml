global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'ticketverse-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          # Note: In production these would be docker network DNS names. 
          # Assuming host networking or matching ports since we run via IDE or docker-compose with host mapping.
          # We'll use host.docker.internal to reach services running on the host OS from within Docker.
          - 'host.docker.internal:8080' # Gateway
          - 'host.docker.internal:8081' # Auth
          - 'host.docker.internal:8082' # Event
          - 'host.docker.internal:8083' # Booking
          - 'host.docker.internal:8084' # Contact
          - 'host.docker.internal:8085' # Notification
          - 'host.docker.internal:8086' # Analytics
          - 'host.docker.internal:8087' # Audit
